name: Apply Fleet Edit Final Cleanup

on:
  pull_request:
    branches:
      - main
    paths:
      - scripts/apply-fleet-edit-final-cleanup.py
      - .github/workflows/apply-fleet-edit-final-cleanup.yml

permissions:
  contents: write

jobs:
  apply-and-test:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      NEXT_PUBLIC_OPENWEATHER_API_KEY: ${{ secrets.NEXT_PUBLIC_OPENWEATHER_API_KEY }}
      NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply targeted fleet fix
        run: python scripts/apply-fleet-edit-final-cleanup.py

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Production guard
        run: npm run test:production

      - name: Static build
        run: npm run build

      - name: Export smoke
        run: npm run test:export

      - name: Commit validated changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/admin/vehicles/page.tsx scripts/production-guard.mjs supabase/fleet-asset-hardening.sql supabase/fleet-edit-partial-and-image-upload.sql supabase/fleet-edit-final-enum-fix.sql
          git commit -m "fix fleet edit enum mapping and simplify form"
          git push origin HEAD:${{ github.head_ref }}
