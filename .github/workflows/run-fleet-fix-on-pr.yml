name: Run Fleet Fix On PR

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/apply-fleet-partial-edit-fix.yml
      - .github/workflows/run-fleet-fix-on-pr.yml

permissions:
  contents: write
  pull-requests: write

jobs:
  apply-fix:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Execute embedded patch
        id: patch
        shell: bash
        run: |
          set +e
          python - <<'PY' > fleet-fix-debug.log 2>&1
          from pathlib import Path

          workflow = Path('.github/workflows/apply-fleet-partial-edit-fix.yml').read_text(encoding='utf-8')
          marker_start = "          from pathlib import Path\n"
          marker_end = "          PY\n\n      - name: Commit applied changes"
          start = workflow.index(marker_start)
          end = workflow.index(marker_end, start)
          embedded_lines = workflow[start:end].splitlines()
          script = '\n'.join(line[10:] if line.startswith('          ') else line for line in embedded_lines)
          exec(compile(script, 'fleet-fix-embedded.py', 'exec'))
          PY
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Report patch error
        if: steps.patch.outputs.exit_code != '0'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          {
            echo '### Fleet patch runner error'
            echo '```text'
            tail -n 40 fleet-fix-debug.log
            echo '```'
          } > fleet-fix-comment.md
          gh pr comment "${{ github.event.pull_request.number }}" --body-file fleet-fix-comment.md
          exit 1

      - name: Commit applied changes
        if: steps.patch.outputs.exit_code == '0'
        shell: bash
        run: |
          rm -f fleet-fix-debug.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/admin/vehicles/page.tsx scripts/production-guard.mjs supabase/fleet-asset-hardening.sql supabase/fleet-edit-partial-and-image-upload.sql
          git commit -m "fix fleet partial edits and image uploads"
          git push origin HEAD:${{ github.head_ref }}
