name: Apply Fleet Partial Edit Fix

on:
  push:
    branches:
      - fix/fleet-partial-edit-image-upload-20260722
    paths:
      - .github/workflows/apply-fleet-partial-edit-fix.yml

permissions:
  contents: write

jobs:
  apply-fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: fix/fleet-partial-edit-image-upload-20260722
          fetch-depth: 0

      - name: Apply fleet partial edit and image upload changes
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          def replace_once(path: Path, old: str, new: str, label: str) -> None:
              text = path.read_text(encoding='utf-8')
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{label}: expected one match, found {count}')
              path.write_text(text.replace(old, new, 1), encoding='utf-8')

          def replace_regex(path: Path, pattern: str, replacement: str, label: str) -> None:
              text = path.read_text(encoding='utf-8')
              updated, count = re.subn(pattern, replacement, text, count=1, flags=re.S)
              if count != 1:
                  raise SystemExit(f'{label}: expected one regex match, found {count}')
              path.write_text(updated, encoding='utf-8')

          page = Path('app/admin/vehicles/page.tsx')
          guard = Path('scripts/production-guard.mjs')
          hardening = Path('supabase/fleet-asset-hardening.sql')

          replace_once(
              page,
              "  Trash2,\n  Wrench,",
              "  Trash2,\n  Upload,\n  Wrench,",
              'add Upload icon'
          )

          replace_once(
              page,
              "const fleetImageOptions = [{ label: 'Auto by fleet type', value: '' }, ...jetCarImageOptions, ...jetSkiImageOptions];",
              "const fleetImageOptions = [{ label: 'Auto by fleet type', value: '' }, ...jetCarImageOptions, ...jetSkiImageOptions];\nconst fleetImageBucket = 'fleet-images';\nconst maxFleetImageBytes = 5 * 1024 * 1024;\nconst allowedFleetImageTypes = new Set(['image/jpeg', 'image/png', 'image/webp']);",
              'add image upload constants'
          )

          replace_once(
              page,
              "const normalizeImei = (value: string) => value.replace(/\\D/g, '');",
              r"""const normalizeImei = (value: string) => value.replace(/\D/g, '');

function fleetImageExtension(file: File) {
  const extension = file.name.split('.').pop()?.toLowerCase();
  if (extension === 'png' || extension === 'webp') return extension;
  return 'jpg';
}

async function uploadFleetImage(file: File, code: string) {
  if (!allowedFleetImageTypes.has(file.type)) throw new Error('Fleet image must be JPG, PNG, or WebP.');
  if (file.size > maxFleetImageBytes) throw new Error('Fleet image must be 5 MB or smaller.');

  const safeCode = normalizeCode(code) || 'fleet-unit';
  const objectPath = `vehicles/${safeCode.toLowerCase()}-${Date.now()}-${crypto.randomUUID().slice(0, 8)}.${fleetImageExtension(file)}`;
  const uploadResult = await supabase.storage.from(fleetImageBucket).upload(objectPath, file, {
    cacheControl: '31536000',
    contentType: file.type,
    upsert: false
  });

  if (uploadResult.error) {
    const message = uploadResult.error.message || 'Fleet image upload failed.';
    if (message.toLowerCase().includes('bucket not found')) {
      throw new Error('Fleet image storage is not active yet. Apply supabase/fleet-edit-partial-and-image-upload.sql first.');
    }
    throw new Error(message);
  }

  const publicUrl = supabase.storage.from(fleetImageBucket).getPublicUrl(objectPath).data.publicUrl;
  if (!publicUrl) throw new Error('Fleet image uploaded, but its public URL could not be created.');
  return publicUrl;
}""",
              'add image upload helper'
          )

          replace_once(
              page,
              "  if (!regNo || regNo.length < 3 || regNo.length > 40) return 'Registration number is required for every fleet unit.';",
              "  if (!editingId && (!regNo || regNo.length < 3 || regNo.length > 40)) return 'Registration number is required for every new fleet unit.';\n  if (regNo && (regNo.length < 3 || regNo.length > 40)) return 'Registration number must contain 3–40 characters.';",
              'allow legacy incomplete registration edits'
          )

          replace_once(
              page,
              "  const duplicateReg = items.find((item) => item.id !== editingId && normalizeKey(item.regNo) === normalizeKey(regNo));\n  if (duplicateReg) return `Registration number ${regNo} is already assigned to ${duplicateReg.code}.`;",
              "  if (regNo) {\n    const duplicateReg = items.find((item) => item.id !== editingId && normalizeKey(item.regNo) === normalizeKey(regNo));\n    if (duplicateReg) return `Registration number ${regNo} is already assigned to ${duplicateReg.code}.`;\n  }",
              'skip empty registration duplicate check'
          )

          replace_once(
              page,
              "function rpcUnavailable(message: string, functionName: string) {\n  const value = message.toLowerCase();\n  return value.includes(functionName.toLowerCase()) && (value.includes('does not exist') || value.includes('schema cache') || value.includes('could not find') || value.includes('pgrst202'));\n}",
              "function rpcUnavailable(message: string, functionName: string) {\n  const value = message.toLowerCase();\n  return value.includes(functionName.toLowerCase()) && (value.includes('does not exist') || value.includes('schema cache') || value.includes('could not find') || value.includes('pgrst202'));\n}\n\nfunction fleetSaveErrorMessage(message: string) {\n  const value = message.toLowerCase();\n  if (value.includes('vehicle_type') && value.includes('type text')) return 'Fleet database enum fix is pending. Apply supabase/fleet-edit-partial-and-image-upload.sql.';\n  return message;\n}",
              'add friendly enum error'
          )

          replace_once(
              page,
              "  async function saveFleet(values: FleetFormValues) {",
              "  async function saveFleet(values: FleetFormValues, imageFile?: File | null) {",
              'accept selected image in save'
          )

          replace_once(
              page,
              "    const code = normalizeCode(values.code);\n    const name = values.name.trim();\n    const imageUrl = values.imageUrl.trim() || imagePathFromCode(code, name, values.type);",
              "    const code = normalizeCode(values.code);\n    const name = values.name.trim();\n    let uploadedImageUrl = '';\n    if (imageFile) {\n      try {\n        uploadedImageUrl = await uploadFleetImage(imageFile, code);\n      } catch (uploadError) {\n        return uploadError instanceof Error ? uploadError.message : 'Unable to upload the fleet image.';\n      }\n    }\n    const imageUrl = uploadedImageUrl || values.imageUrl.trim() || imagePathFromCode(code, name, values.type);",
              'upload selected image after validation'
          )

          replace_once(
              page,
              "    if (rpcResult.error && !rpcUnavailable(rpcResult.error.message || '', 'save_fleet_asset_entry')) return rpcResult.error.message;",
              "    if (rpcResult.error && !rpcUnavailable(rpcResult.error.message || '', 'save_fleet_asset_entry')) return fleetSaveErrorMessage(rpcResult.error.message);",
              'map enum save error'
          )

          replace_once(
              page,
              "function FleetFormModal({ initialValues, onClose, onSubmit }: { initialValues?: FleetRecord; onClose: () => void; onSubmit: (values: FleetFormValues) => Promise<string> }) {\n  const [values, setValues] = useState<FleetFormValues>(initialValues ? { ...initialValues } : emptyFleet);\n  const [saving, setSaving] = useState(false);\n  const [formError, setFormError] = useState('');\n  const issues = initialValues ? complianceIssues(initialValues) : [];",
              "function FleetFormModal({ initialValues, onClose, onSubmit }: { initialValues?: FleetRecord; onClose: () => void; onSubmit: (values: FleetFormValues, imageFile?: File | null) => Promise<string> }) {\n  const [values, setValues] = useState<FleetFormValues>(initialValues ? { ...initialValues } : emptyFleet);\n  const [saving, setSaving] = useState(false);\n  const [formError, setFormError] = useState('');\n  const [imageFile, setImageFile] = useState<File | null>(null);\n  const [imagePreview, setImagePreview] = useState('');\n  const issues = initialValues ? complianceIssues({ ...initialValues, ...values, imageUrl: imagePreview || values.imageUrl }) : [];\n\n  useEffect(() => {\n    if (!imageFile) {\n      setImagePreview('');\n      return;\n    }\n    const previewUrl = URL.createObjectURL(imageFile);\n    setImagePreview(previewUrl);\n    return () => URL.revokeObjectURL(previewUrl);\n  }, [imageFile]);",
              'add image selection state'
          )

          replace_once(
              page,
              "  async function submit(event: FormEvent<HTMLFormElement>) {\n    event.preventDefault();\n    setSaving(true);\n    setFormError('');\n    const message = await onSubmit(values);\n    if (message) setFormError(message);\n    setSaving(false);\n  }",
              "  async function submit(event: FormEvent<HTMLFormElement>) {\n    event.preventDefault();\n    setSaving(true);\n    setFormError('');\n    try {\n      const message = await onSubmit(values, imageFile);\n      if (message) setFormError(message);\n    } finally {\n      setSaving(false);\n    }\n  }",
              'submit selected image'
          )

          replace_once(
              page,
              "  function updateField<K extends keyof FleetFormValues>(name: K, value: FleetFormValues[K]) { setValues((current) => ({ ...current, [name]: value })); }\n  function updateType(value: string) { setValues((current) => ({ ...current, type: value, capacity: value === 'Jet Ski' ? '2' : '4', imageUrl: current.imageUrl || imagePathFromCode(current.code, current.name, value) })); }",
              "  function updateField<K extends keyof FleetFormValues>(name: K, value: FleetFormValues[K]) { setValues((current) => ({ ...current, [name]: value })); }\n  function updateType(value: string) { setValues((current) => ({ ...current, type: value, capacity: value === 'Jet Ski' ? '2' : '4', imageUrl: current.imageUrl || imagePathFromCode(current.code, current.name, value) })); }\n  function selectImage(file: File | null) {\n    if (!file) { setImageFile(null); return; }\n    if (!allowedFleetImageTypes.has(file.type)) { setFormError('Fleet image must be JPG, PNG, or WebP.'); return; }\n    if (file.size > maxFleetImageBytes) { setFormError('Fleet image must be 5 MB or smaller.'); return; }\n    setFormError('');\n    setImageFile(file);\n  }",
              'add image file validation'
          )

          replace_once(
              page,
              "    <form onSubmit={submit} className=\"flex min-h-0 flex-1 flex-col\"><div className=\"grid gap-4 overflow-y-auto px-5 py-4 lg:grid-cols-[1.15fr_0.85fr]\">",
              "    <form onSubmit={submit} className=\"flex min-h-0 flex-1 flex-col\"><div className=\"grid gap-4 overflow-y-auto px-5 py-4 lg:grid-cols-[1.15fr_0.85fr]\"><div className=\"rounded-2xl border border-sky-200 bg-sky-50 px-4 py-3 text-sm font-semibold leading-6 text-sky-800 lg:col-span-2\">You can save available changes now. Missing insurance, tracker, VIN, expiry dates, year, color, or other optional details will remain highlighted and can be completed later.</div>",
              'add partial save guidance'
          )

          replace_once(
              page,
              "        <FormInput label=\"Fleet Code\" value={values.code} required placeholder=\"JC-0001 / JS-0001\" maxLength={40} onChange={(value) => updateField('code', value)} />\n        <FormInput label=\"Vehicle Name\" value={values.name} required maxLength={120} onChange={(value) => updateField('name', value)} />\n        <SelectInput label=\"Vehicle Type\" value={values.type} options={Object.keys(typeMap)} required onChange={updateType} />\n        <FormInput label=\"Registration Number\" value={values.regNo} required maxLength={40} placeholder=\"Required and unique\" onChange={(value) => updateField('regNo', value)} />",
              "        <FormInput label=\"Fleet Code *\" value={values.code} required placeholder=\"JC-0001 / JS-0001\" maxLength={40} onChange={(value) => updateField('code', value)} />\n        <FormInput label=\"Vehicle Name *\" value={values.name} required maxLength={120} onChange={(value) => updateField('name', value)} />\n        <SelectInput label=\"Vehicle Type *\" value={values.type} options={Object.keys(typeMap)} required onChange={updateType} />\n        <FormInput label={initialValues ? 'Registration Number' : 'Registration Number *'} value={values.regNo} required={!initialValues} maxLength={40} placeholder={initialValues ? 'Add when available' : 'Required and unique'} onChange={(value) => updateField('regNo', value)} />",
              'clarify core and registration requirements'
          )

          optional_labels = {
              'Registration Expiry': 'Registration Expiry (optional)',
              'Insurance Number': 'Insurance Number (optional)',
              'Insurance Expiry': 'Insurance Expiry (optional)',
              'Tracker IMEI': 'Tracker IMEI (optional)',
              'Chassis / VIN': 'Chassis / VIN (optional)',
              'Engine / Serial Number': 'Engine / Serial Number (optional)',
              'Brand': 'Brand (optional)',
              'Model': 'Model (optional)',
              'Year': 'Year (optional)',
              'Color': 'Color (optional)',
              'Date of Installation': 'Date of Installation (optional)'
          }
          text = page.read_text(encoding='utf-8')
          for old_label, new_label in optional_labels.items():
              target = f'<FormInput label="{old_label}"'
              if target not in text:
                  raise SystemExit(f'optional label not found: {old_label}')
              text = text.replace(target, f'<FormInput label="{new_label}"', 1)
          text = text.replace('<SelectInput label="Location"', '<SelectInput label="Location *"', 1)
          text = text.replace('<FormInput label="Capacity / Seater"', '<FormInput label="Capacity / Seater *"', 1)
          text = text.replace('<SelectInput label="Status"', '<SelectInput label="Status *"', 1)
          text = text.replace('>Notes<textarea', '>Notes (optional)<textarea', 1)
          page.write_text(text, encoding='utf-8')

          old_image_card = """        <div className="rounded-2xl border border-border bg-[#F7FAFA] p-4"><p className="text-xs font-bold uppercase tracking-[0.14em] text-muted-foreground">Fleet Image</p><div className="mt-3 overflow-hidden rounded-2xl bg-white p-3"><img src={values.imageUrl || imagePathFromCode(values.code, values.name, values.type)} alt={values.name || 'Fleet preview'} className="h-48 w-full rounded-xl object-contain" /></div><select value={values.imageUrl} onChange={(event) => updateField('imageUrl', event.target.value)} className="mt-3 h-10 w-full rounded-xl border border-border bg-white px-3 text-sm">{fleetImageOptions.map((option) => <option key={option.value} value={option.value}>{option.label}</option>)}</select><FormInput label="Custom Image Path" value={values.imageUrl} placeholder="/images/edrive/fleet/jc-01.webp" onChange={(value) => updateField('imageUrl', value)} /></div>"""
          new_image_card = """        <div className="rounded-2xl border border-border bg-[#F7FAFA] p-4">
          <div className="flex items-start justify-between gap-3"><p className="text-xs font-bold uppercase tracking-[0.14em] text-muted-foreground">Fleet Image</p><span className="text-[10px] font-semibold text-muted-foreground">JPG, PNG or WebP · max 5 MB</span></div>
          <div className="mt-3 overflow-hidden rounded-2xl bg-white p-3"><img src={imagePreview || values.imageUrl || imagePathFromCode(values.code, values.name, values.type)} alt={values.name || 'Fleet preview'} className="h-48 w-full rounded-xl object-contain" /></div>
          <label className="mt-3 flex h-11 cursor-pointer items-center justify-center gap-2 rounded-xl border border-dashed border-primary/40 bg-primary-50 text-sm font-bold text-primary transition hover:border-primary hover:bg-primary-100"><Upload className="size-4" aria-hidden="true" />{imageFile ? 'Change selected image' : 'Upload fleet image'}<input type="file" accept="image/jpeg,image/png,image/webp" className="hidden" onChange={(event) => { selectImage(event.currentTarget.files?.[0] || null); event.currentTarget.value = ''; }} /></label>
          {imageFile ? <div className="mt-2 flex items-center justify-between gap-3 rounded-xl border border-emerald-200 bg-emerald-50 px-3 py-2"><span className="min-w-0 truncate text-xs font-semibold text-emerald-800">Selected: {imageFile.name}</span><button type="button" onClick={() => setImageFile(null)} className="shrink-0 text-xs font-bold text-emerald-800 hover:underline">Remove</button></div> : <p className="mt-2 text-xs leading-5 text-muted-foreground">The selected file uploads only when you click Save Fleet Unit.</p>}
          <div className="mt-4 border-t border-border/70 pt-4"><p className="text-[10px] font-bold uppercase tracking-[0.14em] text-muted-foreground">Or use an existing image</p><select value={values.imageUrl} onChange={(event) => { setImageFile(null); updateField('imageUrl', event.target.value); }} className="mt-2 h-10 w-full rounded-xl border border-border bg-white px-3 text-sm">{fleetImageOptions.map((option) => <option key={option.value} value={option.value}>{option.label}</option>)}</select><FormInput label="Custom Image URL / Path (optional)" value={values.imageUrl} placeholder="/images/edrive/fleet/jc-01.webp or https://..." onChange={(value) => { setImageFile(null); updateField('imageUrl', value); }} /></div>
        </div>"""
          replace_once(page, old_image_card, new_image_card, 'replace fleet image card')

          validate_function = r"""create or replace function public.validate_fleet_asset_identifiers()
returns trigger
language plpgsql
security definer
set search_path = public
as $$
declare
  v_code text := upper(regexp_replace(btrim(coalesce(new.vehicle_code, '')), '\s+', '-', 'g'));
  v_reg text := upper(regexp_replace(btrim(coalesce(new.reg_no, '')), '\s+', ' ', 'g'));
  v_imei text := regexp_replace(coalesce(new.device_imei, ''), '[^0-9]', '', 'g');
  v_vin text := upper(btrim(coalesce(new.chassis_vin, '')));
  v_new_status text := lower(coalesce(new.status::text, 'available'));
  v_old_status text := '';
begin
  if tg_op = 'UPDATE' then
    v_old_status := lower(coalesce(old.status::text, ''));
    if v_reg = '' and nullif(btrim(coalesce(old.reg_no, '')), '') is not null then
      v_reg := upper(regexp_replace(btrim(old.reg_no), '\s+', ' ', 'g'));
    end if;
  end if;

  if v_code !~ '^[A-Z0-9][A-Z0-9-]{2,39}$' then
    raise exception 'Fleet code must contain 3-40 letters, numbers, or hyphens.';
  end if;

  if tg_op = 'INSERT' and length(v_reg) < 3 then
    raise exception 'Registration number is required for every new fleet unit.';
  end if;

  if tg_op = 'UPDATE' and v_new_status = 'available' and v_old_status <> 'available' and length(v_reg) < 3 then
    raise exception 'Add the required unique registration number before making this unit Available.';
  end if;

  if coalesce(new.capacity, 0) < 1 or coalesce(new.capacity, 0) > 12 then
    raise exception 'Fleet capacity must be between 1 and 12.';
  end if;

  if v_imei <> '' and (length(v_imei) < 10 or length(v_imei) > 20) then
    raise exception 'Tracker IMEI must contain 10-20 digits.';
  end if;

  if v_new_status not in (
    'available', 'booked', 'reserved', 'assigned', 'in_use', 'maintenance',
    'out_of_service', 'retired', 'inactive', 'for_sale'
  ) then
    raise exception 'Fleet lifecycle status is invalid.';
  end if;

  if v_new_status = 'available' and new.registration_expiry is not null and new.registration_expiry < current_date then
    raise exception 'A fleet unit with expired registration cannot be marked Available.';
  end if;

  if v_new_status = 'available' and new.insurance_expiry is not null and new.insurance_expiry < current_date then
    raise exception 'A fleet unit with expired insurance cannot be marked Available.';
  end if;

  new.vehicle_code := v_code;
  new.reg_no := nullif(v_reg, '');
  new.device_imei := nullif(v_imei, '');
  new.chassis_vin := nullif(v_vin, '');
  new.updated_at := now();
  return new;
end;
$$;"""

          save_function = r"""create or replace function public.save_fleet_asset_entry(
  p_payload jsonb,
  p_vehicle_id uuid default null
)
returns table (vehicle_id uuid)
language plpgsql
security definer
set search_path = public
as $$
declare
  v_code text := upper(regexp_replace(btrim(coalesce(p_payload->>'vehicle_code', '')), '\s+', '-', 'g'));
  v_name text := left(btrim(coalesce(p_payload->>'vehicle_name', p_payload->>'name', '')), 120);
  v_type text := lower(btrim(coalesce(p_payload->>'vehicle_type', p_payload->>'type', '')));
  v_location text := left(btrim(coalesce(p_payload->>'location', 'Dubai')), 120);
  v_reg text := upper(regexp_replace(btrim(coalesce(p_payload->>'reg_no', '')), '\s+', ' ', 'g'));
  v_imei text := nullif(regexp_replace(coalesce(p_payload->>'device_imei', ''), '[^0-9]', '', 'g'), '');
  v_vin text := nullif(upper(btrim(coalesce(p_payload->>'chassis_vin', ''))), '');
  v_engine text := nullif(upper(btrim(coalesce(p_payload->>'engine_serial', ''))), '');
  v_status text := lower(btrim(coalesce(p_payload->>'status', 'available')));
  v_capacity integer;
  v_year integer;
  v_sort_order integer;
  v_registration_expiry date;
  v_insurance_expiry date;
  v_installation_date date;
  v_id uuid;
  v_existing_reg text;
  v_existing_status text := '';
  v_effective_reg text;
begin
  if not public.has_edrive_role(array['super_admin']) then
    raise exception 'Only the Super Admin can create or edit fleet master data.';
  end if;

  if p_vehicle_id is not null then
    select reg_no, lower(coalesce(status::text, ''))
    into v_existing_reg, v_existing_status
    from public.vehicles
    where id = p_vehicle_id
    for update;
    if not found then raise exception 'Fleet unit was not found.'; end if;
  end if;

  begin
    v_capacity := (p_payload->>'capacity')::integer;
    v_year := nullif(p_payload->>'year', '')::integer;
    v_sort_order := coalesce(nullif(p_payload->>'sort_order', '')::integer, 100);
    v_registration_expiry := nullif(p_payload->>'registration_expiry', '')::date;
    v_insurance_expiry := nullif(p_payload->>'insurance_expiry', '')::date;
    v_installation_date := nullif(p_payload->>'date_of_installation', '')::date;
  exception when others then
    raise exception 'Fleet configuration contains an invalid number or date.';
  end;

  if v_code !~ '^[A-Z0-9][A-Z0-9-]{2,39}$' then raise exception 'Fleet code must contain 3-40 letters, numbers, or hyphens.'; end if;
  if length(v_name) < 3 then raise exception 'Vehicle name must contain at least 3 characters.'; end if;
  if v_type not in ('jet_car', 'jet_ski') then raise exception 'Vehicle type is invalid.'; end if;
  if v_reg <> '' and (length(v_reg) < 3 or length(v_reg) > 40) then raise exception 'Registration number must contain 3-40 characters.'; end if;
  if p_vehicle_id is null and length(v_reg) < 3 then raise exception 'Registration number is required for every new fleet unit.'; end if;
  if v_capacity < 1 or v_capacity > 12 then raise exception 'Fleet capacity must be between 1 and 12.'; end if;
  if v_year is not null and (v_year < 1990 or v_year > extract(year from current_date)::integer + 1) then raise exception 'Vehicle year is outside the allowed range.'; end if;
  if v_imei is not null and (length(v_imei) < 10 or length(v_imei) > 20) then raise exception 'Tracker IMEI must contain 10-20 digits.'; end if;
  if v_sort_order < 0 or v_sort_order > 9999 then raise exception 'Display order must be between 0 and 9999.'; end if;
  if v_status not in ('available', 'booked', 'reserved', 'assigned', 'in_use', 'maintenance', 'out_of_service', 'retired', 'for_sale') then raise exception 'Fleet lifecycle status is invalid.'; end if;

  v_effective_reg := nullif(v_reg, '');
  if p_vehicle_id is not null and v_effective_reg is null then
    v_effective_reg := nullif(upper(regexp_replace(btrim(coalesce(v_existing_reg, '')), '\s+', ' ', 'g')), '');
  end if;

  if p_vehicle_id is not null and v_status = 'available' and v_existing_status <> 'available' and coalesce(length(v_effective_reg), 0) < 3 then
    raise exception 'Add the required unique registration number before making this unit Available.';
  end if;

  if v_status = 'available' and v_registration_expiry is not null and v_registration_expiry < current_date then raise exception 'Expired registration cannot be marked Available.'; end if;
  if v_status = 'available' and v_insurance_expiry is not null and v_insurance_expiry < current_date then raise exception 'Expired insurance cannot be marked Available.'; end if;

  if p_vehicle_id is null then
    insert into public.vehicles (
      vehicle_code, vehicle_name, vehicle_type, name, slug, type, description,
      rental_price_aed_per_hour, location, capacity, status, brand, model, year,
      reg_no, registration_expiry, insurance_number, insurance_expiry, device_imei,
      chassis_vin, engine_serial, color, date_of_installation, expiry_date,
      primary_image_url, main_image_url, notes, sort_order, is_available,
      is_visible_public, is_archived, retired_at, updated_at
    ) values (
      v_code, v_name, v_type::public.vehicle_type, v_name, lower(v_code), v_type,
      left(coalesce(p_payload->>'description', ''), 1000),
      0, v_location, v_capacity, v_status::public.vehicle_status,
      left(coalesce(p_payload->>'brand', ''), 80), left(coalesce(p_payload->>'model', ''), 80), v_year,
