name: Apply Public Hero Video

# Validates the final shared-video and fallback-image contract.
on:
  pull_request:
    branches:
      - main
    paths:
      - scripts/apply-public-hero-video.py
      - .github/workflows/apply-public-hero-video.yml
      - components/edrive/hero-video-media.tsx
      - components/edrive/public-video-hero.tsx
      - app/(public)/rentals/page.tsx
      - app/(public)/jet-ski-rentals/page.tsx
      - app/(public)/jet-car-rentals/page.tsx

permissions:
  contents: write

jobs:
  apply-and-test:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      NEXT_PUBLIC_OPENWEATHER_API_KEY: ${{ secrets.NEXT_PUBLIC_OPENWEATHER_API_KEY }}
      NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply shared hero video integration
        run: python scripts/apply-public-hero-video.py

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run typecheck
      - run: npm run test:production
      - run: npm run build
      - run: npm run test:export

      - name: Commit validated integration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add components/edrive/public-pages.tsx app/hero-cta.css scripts/production-guard.mjs
          git commit -m "show shared loop video across public heroes"
          git push origin HEAD:${{ github.head_ref }}
