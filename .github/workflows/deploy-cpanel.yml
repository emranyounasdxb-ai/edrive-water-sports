name: Deploy to cPanel

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_SITE_URL: https://edrivedubai.ae

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Upload build to hosting
        env:
          FTP_HOST: ${{ secrets.CPANEL_FTP_SERVER }}
          FTP_USER: ${{ secrets.CPANEL_FTP_USERNAME }}
          FTP_KEY: ${{ secrets.CPANEL_FTP_PASSWORD }}
          FTP_DIR: ${{ secrets.CPANEL_FTP_DIR }}
        run: |
          lftp -c "set ftp:ssl-allow no; open -u \"$FTP_USER\",\"$FTP_KEY\" \"$FTP_HOST\"; mirror -R --delete --verbose --exclude-glob .well-known/** ./out/ \"$FTP_DIR\""
