name: Debug Fleet Build

on:
  pull_request:
    branches:
      - main
    paths:
      - app/admin/vehicles/page.tsx
      - scripts/production-guard.mjs
      - supabase/fleet-asset-hardening.sql
      - supabase/fleet-edit-partial-and-image-upload.sql
      - .github/workflows/debug-fleet-build.yml

permissions:
  contents: read
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Run production build
        id: build
        shell: bash
        run: |
          set +e
          npm run build > fleet-build.log 2>&1
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Report build error
        if: steps.build.outputs.exit_code != '0'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          {
            echo '### Fleet production build error'
            echo '```text'
            tail -n 100 fleet-build.log
            echo '```'
          } > fleet-build-comment.md
          gh pr comment "${{ github.event.pull_request.number }}" --body-file fleet-build-comment.md
          exit 1
      - name: Confirm build
        if: steps.build.outputs.exit_code == '0'
        run: echo "Production build passed."
