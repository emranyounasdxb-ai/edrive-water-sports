name: FTP Static Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: edrive-production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      NEXT_PUBLIC_OPENWEATHER_API_KEY: ${{ secrets.NEXT_PUBLIC_OPENWEATHER_API_KEY }}
      NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Production regression guard
        run: npm run test:production

      - name: Build static export
        run: npm run build

      - name: Static export smoke test
        run: npm run test:export

      - name: Add Apache production rules
        run: cp public/.htaccess out/.htaccess

      - name: Upload static export artifact
        uses: actions/upload-artifact@v4
        with:
          name: edrive-static-export
          path: out
          include-hidden-files: true
          if-no-files-found: error

      - name: Deploy to cPanel by FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.CPANEL_FTP_SERVER }}
          username: ${{ secrets.CPANEL_FTP_USERNAME }}
          password: ${{ secrets.CPANEL_FTP_PASSWORD }}
          local-dir: ./out/
          server-dir: ${{ secrets.CPANEL_FTP_DIR }}
          state-name: .ftp-deploy-sync-state.json
          log-level: standard
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
